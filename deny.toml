# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# RUSTSEC-2026-0002: lru 0.12.5 has Stacked Borrows unsoundness in IterMut.
# Transitive dependency via ratatui 0.29. No fix available yet.
# Action: Remove this ignore once ratatui bumps lru to a patched version.
ignore = ["RUSTSEC-2026-0002"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "GPL-3.0",
    "BSL-1.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
