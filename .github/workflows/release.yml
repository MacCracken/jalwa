name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    needs: [ci]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            features: ""
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            features: "--no-default-features"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (amd64)
        if: matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libclang-dev libdbus-1-dev pkg-config

      - name: Install cross-compilation tools (arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libclang-dev pkg-config
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          ARCHIVE="jalwa-${VERSION}-linux-${{ matrix.arch }}.tar.gz"
          tar czf "${ARCHIVE}" -C target/${{ matrix.target }}/release jalwa
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jalwa-${{ matrix.arch }}
          path: |
            jalwa-*.tar.gz
            jalwa-*.sha256

  release:
    needs: [ci, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jalwa-*.tar.gz
            jalwa-*.sha256
          generate_release_notes: true
